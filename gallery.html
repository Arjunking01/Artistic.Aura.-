<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>artistic.Aura | High-Resolution Gallery</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/css/styles.css" />
    <style>
      .hires-grid {
        display: grid;
        gap: 24px;
        grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      }

      .hires-grid img {
        width: 100%;
        border-radius: 18px;
        box-shadow: 0 0 20px rgba(255, 140, 0, 0.2);
      }

      .back-link {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        color: var(--accent-2);
        text-decoration: none;
        font-weight: 600;
        margin-top: 16px;
      }

      .back-link:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>artistic.Aura</h1>
      <p class="subtitle">High-Resolution Gallery</p>
    </header>

    <main>
      <section class="section">
        <h2>Full Quality Samples</h2>
        <div class="hires-grid">
          <img src="assets/images/work2.png" alt="High resolution thumbnail design" loading="lazy" />
          <img src="assets/images/work3.jpg" alt="High resolution creative design" loading="lazy" />
          <img src="assets/images/work3.png" alt="High resolution portrait artwork" loading="lazy" />
          <img src="assets/images/work.png" alt="High resolution banner design" loading="lazy" />
        </div>
        <a class="back-link" href="index.html">Back to home</a>
      </section>
    </main>

    <footer>
      <p>© 2026 artistic.Aura | ganta.com</p>
    </footer>
  </body>
</html>
